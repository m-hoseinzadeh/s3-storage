services:
  s3-storage:
    build: .
    image: s3-storage:latest
    container_name: s3-storage
    ports:
      # Three single-purpose ports; front each with its own nginx domain if desired.
      - "8080:8080"   # API     — authenticated S3 protocol (SDK clients)
      - "8081:8081"   # admin   — web panel + its API (served at root)
      - "8082:8082"   # public  — anonymous read-only of public buckets
    environment:
      # SigV4 credentials. Set both; the API is open/unauthenticated if unset.
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-s3storage}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-s3storage-secret}

      # Listener ports (match the published ports above).
      S3_PORT: ${S3_PORT:-8080}
      S3_ADMIN_PORT: ${S3_ADMIN_PORT:-8081}
      S3_PUBLIC_PORT: ${S3_PUBLIC_PORT:-8082}

      # Comma-separated buckets that allow anonymous (public) reads. Served on the
      # public port. Optional.
      S3_PUBLIC_BUCKETS: ${S3_PUBLIC_BUCKETS:-}

      # Comma-separated base domains for `<bucket>.<domain>` virtual-hosting. Optional.
      S3_DOMAINS: ${S3_DOMAINS:-}

      # Comma-separated `host=bucket` custom-domain mappings. Optional.
      # e.g. "files.example.com=assets,cdn.example.com=images"
      S3_DOMAIN_MAP: ${S3_DOMAIN_MAP:-}

      # Embedded web admin panel, served at the root of S3_ADMIN_PORT.
      # Disabled unless S3_ACCESS_KEY/S3_SECRET_KEY are set (log in with those keys).
      S3_ADMIN_ENABLED: ${S3_ADMIN_ENABLED:-false}
      S3_ADMIN_SESSION_TTL: ${S3_ADMIN_SESSION_TTL:-3600}

      # Public base URL of the API, used by the admin panel for presigned links.
      # Set to the host SDK clients reach (e.g. https://api.example.com). Required
      # to mint presigned links; when unset the panel returns a clear error.
      S3_API_PUBLIC_URL: ${S3_API_PUBLIC_URL:-}

      RUST_LOG: ${RUST_LOG:-info}
    volumes:
      # Named volume (simple, portable).
      - s3data:/data
      # Or bind-mount a host directory instead:
      # - ./data:/data
    restart: unless-stopped

volumes:
  s3data:
